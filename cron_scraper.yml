name: Election Data Scraper

on:
  schedule:
    # 매일 자정(KST 기준 오전 9시)에 자동으로 실행 (UTC 기준 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 깃허브 웹사이트에서 수동으로도 실행할 수 있게 버튼을 만들어줍니다.

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 저장소의 코드를 서버로 가져옴
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 파이썬 환경 설치
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 필요한 라이브러리(requests) 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. 파이썬 스크립트 실행 (데이터 수집 및 JSON 저장)
    - name: Run Scraper
      run: python scraper.py

    # 5. 변경된 JSON 파일을 깃허브 저장소에 자동으로 커밋 및 푸시
    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data/election_result.json
        # 변경 사항이 있을 때만 커밋
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update election data [skip ci]" && git push)