name: 시군구 자료 병합 4_0000.json

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. 저장소 코드 가져오기
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. 파이썬 환경 설정
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 데이터 취합 스크립트 실행
    # (파이썬 스크립트 파일명이 generate_summary.py 가 아니라면 수정해 주세요)
    - name: Run Summary Script
      run: |
        python convert_2026_sum_sgg.py

    # 4. 새로 생성되거나 변경된 3_0000.json 파일 저장소에 다시 커밋&푸시하기
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 파일 변경 사항 체크
        if [ -n "$(git status --porcelain data/jibang/9/4_0000.json)" ]; then
          git add data/jibang/9/4_0000.json
          git commit -m "chore: 전국 요약 데이터(4_0000.json) 수동 갱신 [skip ci]"
          git push
        else
          echo "No changes detected in 4_0000.json. Skipping push."
        fi
