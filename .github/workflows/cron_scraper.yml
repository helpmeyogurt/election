name: Election Data Scraper

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 한국시간 오전 9시 작동
  workflow_dispatch:      # 수동 실행 지원

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # data/jibang/8/ 하위의 모든 json 파일을 추적하여 스테이징합니다.
        git add data/jibang/8/*.json
        
        # 변경 사항이 존재할 때만 자동 push를 실행합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 정제된 선거 데이터 업데이트 [skip ci]" && git push)
