name: 🗳️ 9회 지선 후보자 정보 자동 수집 시스템

on:
  schedule:
    # 🚨 한국 시간(KST) 매일 새벽 4시 15분에 자동으로 작동합니다. (UTC 19:15)
    - cron: '15 19 * * *'
  workflow_dispatch:
    # 🚨 깃허브 웹사이트(Actions 탭)에서 내가 원할 때 수동으로 바로 실행할 수 있는 버튼을 만듭니다.

jobs:
  collect-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 파이썬 환경 설정 (3.10)
        uses: actions/setup-python@v5
        with:
          python-python: '3.10'

      - name: 📦 필수 라이브러리 설치 (requests)
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 📡 1단계: 선관위 후보자 명부 원본 수집 실행
        run: |
          python candidate_crawler.py

      # - name: 🛠️ 2단계: 수집된 후보자 원본 가공 처리 (추후 가공 파일 완성 후 주석 해제)
      #   run: |
      #     python candidate_refiner.py

      - name: 🚀 3단계: 변경된 데이터 깃허브에 커밋 및 푸시
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          # candidate_ori_ 로 시작하는 모든 수집 본을 스테이징에 추가
          git add data/jibang/8/candidate_ori_*.json
          
          # 변경사항이 있을 때만 커밋을 수행하여 에러를 방지합니다.
          if ! git diff --cached --quiet; then
            git commit -m "📝 [자동 반영] 제9회 지방선거 후보자 데이터 업데이트 완료"
            git push
            echo "🟢 새로운 후보자 정보가 성공적으로 푸시되었습니다."
          else
            echo "🟡 변경된 후보자 데이터가 없어 커밋을 건너뜁니다."
          fi
