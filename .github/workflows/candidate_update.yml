name: 🗳️ 9회 지선 후보자 정보 자동 수집 시스템

on:
  workflow_dispatch:      # 수동 실행 지원

jobs:
  collect-candidates:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper
      run: python -u candidate_crawler.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # 🚨 [경로 반영] 8번 폴더 연동 해제 및 9번 폴더 안전 생성/추적 매핑
        mkdir -p data/jibang/9
        git add data/jibang/9/*.json
        
        # 변경 사항이 존재할 때만 자동 push를 실행합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "📝 [자동 반영] 제9회 지방선거 후보자 데이터 업데이트 완료 [skip ci]" && git push)
