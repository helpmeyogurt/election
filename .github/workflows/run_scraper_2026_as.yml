name: 2026 국회의원 보궐선거

on:
  workflow_dispatch:
    inputs:
      min_delay:
        description: '최소 대기 시간 (초)'
        required: true
        default: '30.0'
        type: string
      max_delay:
        description: '최대 대기 시간 (초)'
        required: true
        default: '45.0'
        type: string
      max_retries:
        description: '네트워크 실패 시 최대 재시도 횟수'
        required: true
        default: '3'
        type: string

jobs:
  scrape_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Election Scraper
      env:
        INPUT_MIN: ${{ github.event.inputs.min_delay }}
        INPUT_MAX: ${{ github.event.inputs.max_delay }}
        INPUT_RETRY: ${{ github.event.inputs.max_retries }}
      run: |
        # 파이썬 스크립트의 설정 변수들을 깃허브 수동 입력 파라미터값으로 각각 치환
        sed -i "s/MIN_DELAY = [0-9.]*/MIN_DELAY = $INPUT_MIN/g" scraper_2026_sd.py
        sed -i "s/MAX_DELAY = [0-9.]*/MAX_DELAY = $INPUT_MAX/g" scraper_2026_sd.py
        sed -i "s/MAX_RETRIES = [0-9]*/MAX_RETRIES = $INPUT_RETRY/g" scraper_2026_sd.py
        
        # 실시간 모니터링 출력으로 수집 진행 상황 추적
        python -u scraper_2026_as.py

    - name: Commit and Push Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add data/
        if ! git diff --cached --quiet; then
          git commit -m "💡 자동 데이터 수집: 선관위 원본 데이터 업데이트 ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        else
          echo "변경되거나 새로 수집된 데이터가 없습니다."
        fi
