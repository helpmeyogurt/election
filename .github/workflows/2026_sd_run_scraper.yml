name: 2026 지방선거 시도지사

# 1. 수동 실행(workflow_dispatch) 활성화
on:
  workflow_dispatch:
    inputs:
      delay_time:
        description: '지자체별 요청 대기 시간 (초)'
        required: true
        default: '20'
        type: string

jobs:
  scrape_data:
    runs-on: ubuntu-latest

    steps:
    # 2. 리포지토리 체크아웃
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 3. 파이썬 환경 설정 (가장 안정적인 3.10 버전 선택)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. 필수 라이브러리 설치 (requests가 필요하므로 설치)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 5. 수동 입력받은 대기 시간을 파이썬 스크립트에 전달하여 실행
    #    (환경변수 파싱이나 코드 수정 없이 파일 내용 자체의 변수를 치환해 실행하는 방식)
    - name: Run Election Scraper
      env:
        INPUT_DELAY: ${{ github.event.inputs.delay_time }}
      run: |
        # 스크립트 상단의 DELAY_SECONDS = 20 부분을 입력값으로 치환
        sed -i "s/DELAY_SECONDS = [0-9]*/DELAY_SECONDS = $INPUT_DELAY/g" scraper_2026_sd.py
        python scraper_2026_sd.py

    # 6. 다운로드된 원본 JSON 데이터들을 리포지토리에 자동 커밋 & 푸시
    - name: Commit and Push Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 새로운 데이터 파일이 생겼는지 확인
        git add data/
        
        # 변경사항이 있을 때만 커밋 및 푸시 진행 (에러 방지)
        if ! git diff --cached --quiet; then
          git commit -m "💡 자동 데이터 수집: 선관위 원본 데이터 업데이트 ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        else
          echo "변경되거나 새로 수집된 데이터가 없습니다."
        fi
