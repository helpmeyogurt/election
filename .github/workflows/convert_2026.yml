name: 2026 지방선거 데이터 변환

on:
  workflow_dispatch:
    inputs:
      elec_code:
        description: '변환할 선거 종류 선택 (3: 시도지사, 4: 시군구청장)'
        required: true
        default: '3'
        type: choice
        options:
          - '3'
          - '4'

permissions:
  contents: write

jobs:
  convert_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Converter
        run: python -u convert_2026.py "${{ inputs.elec_code }}"

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 하위 폴더 구조(8, 9 등)에 상관없이 매칭되는 생성/수정 파일들을 안전하게 스테이징합니다.
          find data/jibang -type f -name "*_${{ inputs.elec_code }}_*.json" ! -name "ori_*" -exec git add {} +
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: 로컬 원본 기반 JSON 데이터(선거코드 ${{ inputs.elec_code }}) 재정제 완료 [skip ci]"
            git push
          else
            echo "변경되거나 새로 생성된 정제 파일이 없어 푸시를 생략합니다."
          fi
