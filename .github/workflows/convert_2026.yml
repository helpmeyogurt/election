name: 2026 지방선거 데이터 변환

on:
  workflow_dispatch:
    # 깃허브 웹사이트에서 실행할 때 선거 종류를 선택할 수 있는 입력창을 제공합니다.
    inputs:
      elec_code:
        description: '변환할 선거 종류 선택 (3: 시도지사, 4: 시군구청장)'
        required: true
        default: '3'
        type: choice
        options:
          - '3'
          - '4'

# GITHUB_TOKEN에 저장소 쓰기 권한을 명시적으로 부여합니다.
permissions:
  contents: write

jobs:
  convert_data:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소에 올라가 있는 소스코드와 파일들을 가져옵니다.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 파이썬 환경 세팅
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 가장 안전하고 표준적인 ${{ inputs.elec_code }} 컨텍스트를 사용하여 인자를 주입합니다.
      - name: Run Converter
        run: python -u convert_2026.py "${{ inputs.elec_code }}"

      # 4. [보완] 파이썬 스크립트와 맞춰 '9' 폴더 아래의 결과 파일만 정확히 타겟팅하여 스테이징합니다.
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 9번 폴더 내에서 이번에 선택한 선거코드 결과 파일만 안전하게 지정해서 추가합니다.
          git add data/jibang/9/${{ inputs.elec_code }}_*.json 2>/dev/null || true
          
          # 변경 사항이 있을 때만 커밋 및 푸시를 실행하여 에러를 방지합니다.
          if ! git diff --staged --quiet; then
            git commit -m "chore: 로컬 원본 기반 JSON 데이터(선거코드 ${{ inputs.elec_code }}) 재정제 완료 [skip ci]"
            git push
          else
            echo "변경되거나 새로 생성된 정제 파일이 없어 푸시를 생략합니다."
          fi
